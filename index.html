<!DOCTYPE html>
 <html lang="en">
  <head>
     <meta charset="UTF-8">
     <title>Bobby Buffet Newsletter</title>
     <link rel="stylesheet" href="styles.css"/>
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com">
     <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
     <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.css"/>
     <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick-theme.css"/>
	 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.min.js"></script>
	 <script src="https://cdnjs.cloudflare.com/ajax/libs/cleave.js/1.6.0/cleave.min.js"></script>
  </head>
 <body>
  <header class="site-header">
    <!-- optional: logo + nav later -->
  </header>
  <main>
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-inner">
        <h1 id="title">Join the Buffet Club</h1>
        <p id="description">
          Subscribe to receive exclusive alerts on new merch, upcoming bouts, and more!
        </p>
        <form id="survey-form" method="post" action="https://formspree.io/f/xwvljgvb" class="card">
          <!-- formspree honeypot -->
          <input type="text" name="_gotcha" style="display:none">
          <fieldset>
            <label id="name-label">Full Name:
              <input id="name" name="full_name" type="text" placeholder="John Smith" required autocomplete="name">
            </label>
            <label id="email-label">Email:
              <input id="email" name="email" type="email" placeholder="hungryman@eat.com" required autocomplete="email">
            </label>
            <label id="phone-label">Phone#:
              <input id="phone" name="phone_number" type="tel" placeholder="555-555-5555" required autocomplete="tel">
            </label>
          </fieldset>
          <input id="submit" type="submit" value="Submit">
        </form>
        <div id="thank-you" hidden aria-live="polite">
          <p>Thanks for joining the Buffet Club! Check your email for exclusive updates.</p>
        </div>
      </div>
    </section>
    <!-- MATCH CAROUSEL (moves to its own readable section) -->
    <section class="matches">
      <h2 class="section-title">Featured Matches</h2>
      <div class="match-carousel">
        <!-- your match-slide blocks exactly as they are -->
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p>&copy; 2024 Hurley Jones. All Rights Reserved.</p>
    <div class="social">
      <a href="https://github.com/h0j0codej0" target="_blank" rel="noopener noreferrer"><i class="fab fa-github"></i></a>
      <a href="https://www.linkedin.com/in/hurley-jones-4892a32b9/" target="_blank" rel="noopener noreferrer"><i class="fab fa-linkedin-in"></i></a>
    </div>
  </footer>
  <script src="buffetclub.js"></script>
</body>
</html>
